<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc"/>
  <!-- Soil layer -->
  <rect x="100" y="250" width="400" height="120" fill="#e2e8f0"/>
  <!-- Ceramic pot -->
  <rect x="250" y="200" width="100" height="50" rx="10" ry="10" fill="#1a1a1a"/>
  <!-- Snake plant silhouette -->
  <path d="M260 200 Q280 150 300 200 Q320 150 340 200 Q360 150 380 200" stroke="#22c55e" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Monstera leaf -->
  <path d="M150 120 Q200 80 250 120 Q300 80 350 120 Q400 80 450 120" stroke="#6366f1" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Watering can -->
  <rect x="50" y="80" width="40" height="80" rx="5" ry="5" fill="#a855f7"/>
  <rect x="70" y="20" width="5" height="60" fill="#a855f7"/>
  <circle cx="72.5" cy="20" r="8" fill="#a855f7"/>
  <!-- Spray bottle -->
  <rect x="500" y="120" width="30" height="70" rx="4" ry="4" fill="#f59e0b"/>
  <rect x="515" y="100" width="5" height="20" fill="#f59e0b"/>
  <!-- Sun ray -->
  <line x1="300" y1="10" x2="300" y2="80" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="10" x2="260" y2="30" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="10" x2="340" y2="30" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
</svg>