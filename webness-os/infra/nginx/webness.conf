# ─────────────────────────────────────────────────────────
# Webness OS — Nginx Reverse Proxy Configuration
# Oracle Cloud ARM Server (Ubuntu 24.04 LTS)
# ─────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=60r/m;

# Upstream servers
upstream api_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream client_dashboard {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream admin_dashboard {
    server 127.0.0.1:3003;
    keepalive 8;
}

# ─── Client Dashboard: app.webness.in ─────────────────────
server {
    listen 80;
    server_name app.webness.in;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name app.webness.in;

    ssl_certificate /etc/letsencrypt/live/app.webness.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.webness.in/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client dashboard (React SPA)
    location / {
        proxy_pass http://client_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running tool executions
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Auth routes (stricter rate limit)
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streaming (critical: disable buffering)
    location /api/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # ── SSE-specific settings ──
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s; # 24h keep-alive
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    # Webhook routes (higher rate limit, no auth)
    location /api/webhooks/ {
        limit_req zone=webhooks burst=10 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block dot files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/app.webness.in.access.log;
    error_log /var/log/nginx/app.webness.in.error.log;
}

# ─── Admin Dashboard: admin.webness.in ────────────────────
server {
    listen 80;
    server_name admin.webness.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.webness.in;

    ssl_certificate /etc/letsencrypt/live/admin.webness.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.webness.in/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Extra security for admin — IP allowlist
    # Update ADMIN_IP_ALLOWLIST in .env and regenerate
    # allow 1.2.3.4;  # Your static IP
    # deny all;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Admin dashboard (React SPA)
    location / {
        proxy_pass http://admin_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API routes (proxied to same API)
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # SSE for admin
    location /api/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
        add_header X-Accel-Buffering no;
    }

    access_log /var/log/nginx/admin.webness.in.access.log;
    error_log /var/log/nginx/admin.webness.in.error.log;
}
